spring.application.name=wingify-backend
server.port=8080

# MySQL
spring.datasource.url=jdbc:mysql://localhost:3306/wingify_db?useSSL=false&serverTimezone=UTC&createDatabaseIfNotExist=true
spring.datasource.username=root
spring.datasource.password=root
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.format_sql=true

# JWT
app.jwt.secret=change-me-to-a-very-long-random-secret-key-at-least-32-bytes
app.jwt.expiration-ms=86400000

# CORS (React frontend)
app.cors.allowed-origins=http://localhost:5173,http://localhost:3000
